<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cactos</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

.box {
    width: 90%;
    max-width: 450px;
    padding: 30px;
    text-align: center;
    background: #151515;
    border: 1px solid #333;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,.4);
}

h1 {
    margin-top: 0;
    margin-bottom: 20px;
}

.section {
    margin-top: 20px;
}

.section h2 {
    margin-bottom: 10px;
    font-size: 16px;
    color: #ccc;
}

a {
    color: #4da3ff;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.project {
    color: #aaa;
    font-size: 14px;
}

.discord-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 10px 18px;
    background: #5865F2;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

.discord-btn:hover {
    opacity: 0.9;
    text-decoration: none;
}
</style>
</head>

<body>
<div class="box">

    <h1>Cactos</h1>

    <div class="section">
        <h2>Emails</h2>
        <p><a href="mailto:cactos@c-actos.nl">cactos@c-actos.nl</a></p>
        <p><a href="mailto:support@c-actos.nl">support@c-actos.nl</a></p>
    </div>

    <div class="section">
        <h2>Current Projects</h2>
        <p class="project">TDS Helpers</p>
        <a class="discord-btn" href="https://discord.gg/e5Vn8JU5qW" target="_blank">
            Join Discord
        </a>
    </div>

</div>
</body>
</html>
