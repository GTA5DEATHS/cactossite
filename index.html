<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cactos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:#0b0f14;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,.15), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0,255,180,.10), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(100,100,255,.12), transparent 30%);
    animation:float 12s ease-in-out infinite alternate;
}

@keyframes float{
    from{transform:translateY(0px);}
    to{transform:translateY(-30px);}
}

.card{
    position:relative;
    z-index:1;
    width:90%;
    max-width:700px;
    padding:40px;
    border-radius:20px;
    background:rgba(18,22,28,.85);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:20px;
    background:linear-gradient(135deg,#00aaff,#00ffcc);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    color:#081018;
}

h1{
    text-align:center;
    margin-top:20px;
    font-size:42px;
}

.tagline{
    text-align:center;
    color:#9ea7b3;
    margin-top:10px;
}

.section{
    margin-top:35px;
}

.section h2{
    margin-bottom:12px;
    color:#d4d9df;
}

.contact-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.contact-list a{
    color:#4da3ff;
    text-decoration:none;
}

.contact-list a:hover{
    text-decoration:underline;
}

.project-card{
    background:#10151c;
    border:1px solid rgba(255,255,255,.06);
    border-radius:12px;
    padding:15px;
}

.project-title{
    font-weight:bold;
    margin-bottom:8px;
}

.project-desc{
    color:#9ea7b3;
    font-size:14px;
    margin-bottom:12px;
}

.discord-btn{
    display:inline-block;
    padding:10px 18px;
    background:#5865F2;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.discord-btn:hover{
    opacity:.9;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#666;
    font-size:13px;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">C</div>

    <h1>Cactos</h1>

    <p class="tagline">
        Projects, Communities, and Services.
    </p>

    <div class="section">
        <h2>Contact</h2>

        <div class="contact-list">
            <a href="mailto:cactos@c-actos.nl">
                cactos@c-actos.nl
            </a>

            <a href="mailto:support@c-actos.nl">
                support@c-actos.nl
            </a>
        </div>
    </div>

    <div class="section">
        <h2>Current Projects</h2>

        <div class="project-card">
            <div class="project-title">
                TDS Helpers
            </div>

            <div class="project-desc">
                Community support and resources for TDS players.
            </div>

            <a class="discord-btn"
               href="https://discord.gg/e5Vn8JU5qW"
               target="_blank">
               Join Discord
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 Cactos • c-actos.nl
    </div>

</div>

</body>
</html>
